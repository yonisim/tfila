<div
  id="friday_single_page_plag"
  class="tz-page tz-page-bg relative flex h-full min-h-0 w-full max-w-full min-w-0 flex-col overflow-hidden text-on-surface fade-in"
>
  <div
    class="tfilot-dates-strip pointer-events-none absolute right-0 top-0 z-10 flex max-w-[min(100%,22rem)] flex-wrap items-start justify-end px-container-padding pb-1 pt-3 sm:pt-4"
    dir="rtl"
  >
    <div class="header-hebrew-panel pointer-events-auto min-w-0 shrink-0">
      <div id="tz_hebrew_date" class="header-text"></div>
    </div>
  </div>
  <div class="header-clock-circle tfilot-hero-clock tfilot-clock-corner pointer-events-none">
    <div class="clock pointer-events-auto" dir="ltr">
      <span class="clock-text hour">00</span>
      <b class="clock-text colon">:</b>
      <span class="clock-text min">00</span>
      <b class="clock-text colon">:</b>
      <span class="clock-text second">00</span>
    </div>
  </div>
  <main
    class="tfilot-main-offset relative z-0 flex min-h-0 min-w-0 flex-1 flex-col overflow-hidden px-container-padding pb-2 font-body-md"
  >
    <div
      class="friday-tz-scroll-host flex min-h-0 w-full flex-1 flex-col justify-center overflow-x-hidden overflow-y-auto overscroll-contain"
    >
      <div
        class="tz-two-col-grid grid w-full min-w-0 max-w-full shrink-0 grid-cols-[minmax(0,1.58fr)_minmax(0,1fr)] grid-rows-[auto_auto] items-stretch gap-x-4 gap-y-2 overflow-hidden sm:gap-x-5 sm:gap-y-2 md:gap-x-6 md:gap-y-2.5"
      >
        <div class="tz-section-header flex min-h-[2.6rem] min-w-0 shrink-0 items-center self-stretch py-1">
          <div class="flex min-w-0 flex-1 flex-col gap-0.5">
            <h2 class="tz-section-title">זמני תפילות שישי</h2>
            <p
              class="tz-section-parasha m-0 max-w-full text-pretty ps-0.5 font-body-md text-sm font-medium leading-snug text-[#fdfbf7]/[0.92] sm:text-base"
              id="prayer-times-title-parasha"
            ></p>
          </div>
          <div class="tz-section-rule" aria-hidden="true"></div>
        </div>
        <div class="tz-section-header flex min-h-[2.6rem] min-w-0 shrink-0 items-center self-stretch py-1">
          <h2 class="tz-section-title">זמני היום בהלכה</h2>
          <div class="tz-section-rule" aria-hidden="true"></div>
        </div>
        <div
          class="tz-tf-col-cell flex h-full min-h-0 min-w-0 max-w-full flex-col gap-2 overflow-hidden pr-1 sm:pr-1"
        >
          <div
            id="friday_prayers"
            class="min-h-0 min-w-0 max-w-full flex-1 overflow-y-auto overflow-x-hidden overscroll-contain"
          ></div>
          <div
            class="tz-section-header flex min-h-[2.35rem] min-w-0 shrink-0 items-center self-stretch py-1"
          >
            <h3 class="tz-section-title !whitespace-normal !text-[clamp(0.92rem,1.75vw,1.38rem)]">
              מנין פלג
            </h3>
            <div class="tz-section-rule" aria-hidden="true"></div>
          </div>
          <div
            id="plag"
            class="min-h-0 w-full min-w-0 shrink-0 overflow-y-auto overflow-x-hidden overscroll-contain"
          ></div>
          <div id="kabalat-shabat-parent" class="min-h-0 shrink-0"></div>
        </div>
        <div
          id="day_times"
          class="tz-tf-col-cell flex h-full min-h-0 min-w-0 max-w-full flex-col overflow-y-auto overflow-x-hidden overscroll-contain pr-1"
        ></div>
      </div>
    </div>
  </main>
</div>
