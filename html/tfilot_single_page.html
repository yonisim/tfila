<div id="tfilot_single_page" class="tz-page-bg relative flex h-full min-h-0 w-full max-w-full min-w-0 flex-col overflow-hidden text-on-surface">
  <div
    class="tfilot-dates-strip pointer-events-none absolute right-0 top-0 z-10 flex max-w-[min(100%,22rem)] flex-wrap items-start justify-end px-container-padding pb-1 pt-3 sm:pt-4"
    dir="rtl"
  >
    <div class="header-hebrew-panel pointer-events-auto min-w-0 shrink-0">
      <div id="tfilot_hebrew_date" class="header-text"></div>
    </div>
  </div>
  <div class="header-clock-circle tfilot-hero-clock tfilot-clock-corner pointer-events-none">
    <div class="clock pointer-events-auto">
      <span class="clock-text hour">00</span>
      <b class="clock-text colon">:</b>
      <span class="clock-text min">00</span>
      <b class="clock-text colon">:</b>
      <span class="clock-text second">00</span>
    </div>
  </div>
  <main
    class="tfilot-main-offset relative z-0 flex min-h-0 min-w-0 flex-1 flex-col overflow-hidden px-container-padding pb-2 font-body-md"
  >
    <div
      class="flex min-h-0 flex-1 flex-col justify-center overflow-x-hidden overflow-y-auto overscroll-contain"
    >
      <div
        class="grid min-h-0 w-full max-w-full shrink-0 grid-cols-[minmax(0,1.58fr)_minmax(0,1fr)] grid-rows-[auto_minmax(0,1fr)] gap-x-5 gap-y-3 overflow-hidden sm:gap-x-6 sm:gap-y-3 md:gap-x-8 md:gap-y-3"
      >
        <div class="tz-section-header flex min-h-[3.25rem] min-w-0 shrink-0 items-center self-stretch">
          <h2 class="tz-section-title">זמני תפילות חול</h2>
          <div class="tz-section-rule" aria-hidden="true"></div>
        </div>
        <div class="tz-section-header flex min-h-[3.25rem] min-w-0 shrink-0 items-center self-stretch">
          <h2 class="tz-section-title">זמני היום בהלכה</h2>
          <div class="tz-section-rule" aria-hidden="true"></div>
        </div>
        <div
          id="prayer_times"
          class="flex min-h-0 min-w-0 max-w-full flex-col gap-3 overflow-y-auto overflow-x-hidden overscroll-contain pr-1"
        ></div>
        <div
          id="day_times"
          class="flex min-h-0 min-w-0 max-w-full flex-col gap-2 overflow-y-auto overflow-x-hidden overscroll-contain pr-1"
        ></div>
      </div>
    </div>
  </main>
</div>
